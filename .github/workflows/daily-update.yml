name: 每日时政更新d
  on:
    schedule:
      - cron: '0 23 * * *'
    workflow_dispatch:
  jobs:
    update:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with: { python-version: '3.11', cache: 'pip' }
        - run: |
            pip install requests beautifulsoup4 lxml chardet urllib3
            python scripts/fetch_sources.py
            if [ -f data/new_items.json ]; then python scripts/generate_content.py; fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/data.json
            git diff --quiet && git diff --staged --quiet && exit 0
            git commit -m "chore: 每日时政更新 $(date +'%Y-%m-%d')"
            git push
