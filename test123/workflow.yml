name: 每日时政更新
on:
  schedule:
    # UTC 23:00 = 北京时间 07:00
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      force_buffer:
        description: '强制使用缓存池'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml chardet urllib3

      - name: 创建数据目录
        run: mkdir -p data/cache

      - name: 抓取时政内容
        id: fetch
        run: python scripts/fetch_sources.py 2>&1
        continue-on-error: true

      - name: 检查是否有新内容
        id: check
        run: |
          if [ -f data/new_items.json ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: 生成并合并内容
        if: steps.check.outputs.found == 'true'
        run: python scripts/generate_content.py

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --quiet && git diff --staged --quiet && exit 0
          git commit -m "chore: 每日时政更新 $(date +'%Y-%m-%d')"
          git push
